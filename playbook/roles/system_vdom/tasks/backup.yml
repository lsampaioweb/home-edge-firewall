---
- name: "Fetching all System VDOM entries"
  ansible.builtin.include_tasks: "{{ path_common_firewall_configuration_fact }}"
  vars:
    selector: "system_vdom"

- name: "Debug"
  tags: ["never", "debug"]
  ansible.builtin.debug:
    msg: "{{ data }}"

- name: "Ensure the backup directory exists"
  ansible.builtin.include_tasks: "{{ path_common_firewall_create_directory }}"
  vars:
    path: "{{ backup_system_vdom_path }}"

- name: "Saving the System VDOM backup and minimal files"
  ansible.builtin.include_tasks: "{{ path_common_firewall_save_backup_files }}"
  vars:
    entry: "{{ (item | ansible.utils.remove_keys(target=[invalid_attribute])) }}"
    dest_dir: "{{ backup_system_vdom_path }}"
    dest_basename: "{{ (('%02d' | format(item['vcluster-id'] | int)) ~ '-' ~ (item['short-name'] | replace(' ', '-'))) | lower }}"
    minimal_keys: "{{ system_vdom_minimal_keys }}"
  loop: "{{ data.meta.results | default([]) }}"
  loop_control:
    label: "{{ item['short-name'] }}"
