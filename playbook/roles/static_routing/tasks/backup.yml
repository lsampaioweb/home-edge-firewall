---
- name: "Fetching all Static Routing entries"
  ansible.builtin.include_tasks: "{{ path_common_firewall_configuration_fact }}"
  vars:
    selector: "router_static"

- name: "Debug"
  ansible.builtin.debug:
    msg: "{{ data }}"
  tags: ["never", "debug"]

- name: "Ensure the backup directory exists"
  ansible.builtin.include_tasks: "{{ path_common_firewall_create_directory }}"
  vars:
    path: "{{ backup_static_routing_path }}"

- name: "Saving the Static Routing backup and minimal files"
  ansible.builtin.include_tasks: "{{ path_common_firewall_save_backup_files }}"
  vars:
    entry: "{{ (item | ansible.utils.remove_keys(target=[invalid_attribute])) }}"
    dest_dir: "{{ backup_static_routing_path }}"
    dest_basename: "{{ ('%03d' | format(item.priority | int)) ~ '-' ~ (item['sdwan-zone'][0].name | replace(' ', '-')) | lower }}"
    minimal_keys: "{{ static_routing_minimal_keys }}"
  loop: "{{ data.meta.results | default([]) }}"
  loop_control:
    label: "{{ item['sdwan-zone'][0].name }}"
