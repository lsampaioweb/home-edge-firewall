---
- name: "Fetching the Syslog settings"
  ansible.builtin.include_tasks: "{{ path_common_firewall_configuration_fact }}"
  vars:
    selector: "log.syslogd_setting"

- name: "Debug"
  ansible.builtin.debug:
    msg: "{{ data }}"
  tags: ["never", "debug"]

- name: "Ensure the backup directory exists"
  ansible.builtin.include_tasks: "{{ path_common_firewall_create_directory }}"
  vars:
    path: "{{ backup_syslog_path }}"

- name: "Saving the Syslog backup and minimal files"
  ansible.builtin.include_tasks: "{{ path_common_firewall_save_backup_files }}"
  vars:
    entry: >-
      {{ (data.meta.results
      | ansible.utils.remove_keys(target=[invalid_attribute, 'syslog-type'])) }}
    dest_dir: "{{ backup_syslog_path }}"
    dest_basename: "{{ (data.meta.results.server | replace(' ', '-')) | lower }}"
    minimal_keys: "{{ syslog_minimal_keys }}"
