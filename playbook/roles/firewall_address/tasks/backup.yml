---
- name: "Fetching all firewall addresses"
  ansible.builtin.include_tasks: "{{ path_common_firewall_configuration_fact }}"
  vars:
    selector: "firewall_address"

- name: "Debug"
  ansible.builtin.debug:
    msg: "{{ data }}"
    # msg: "{{ data.meta.results }}"
    # msg: "{{ data.meta.results[1] }}"
  tags: ["never", "debug"]

- name: "Ensure the backup directory exists"
  ansible.builtin.include_tasks: "{{ path_common_firewall_create_directory }}"
  vars:
    path: "{{ backup_firewall_address_path }}"

- name: "Saving the Firewall Address backup and minimal files"
  when: item.comment is search(search_keywork, ignorecase=true)
  ansible.builtin.include_tasks: "{{ path_common_firewall_save_backup_files }}"
  vars:
    entry: "{{ (item | ansible.utils.remove_keys(target=[invalid_attribute])) }}"
    dest_dir: "{{ backup_firewall_address_path }}"
    dest_basename: "{{ (item.name | replace(' ', '-')) | lower }}"
    minimal_keys: "{{ firewall_address_minimal_keys }}"
  loop: "{{ data.meta.results | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
