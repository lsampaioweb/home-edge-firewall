---
- name: "Reading the json file '{{ file.path }}' that contains the desired settings"
  ansible.builtin.set_fact:
    desired_settings: "{{ lookup('file', file.path) | from_json }}"

- name: "Printing the desired settings json object"
  ansible.builtin.debug:
    msg: "{{ desired_settings }}"
  tags: ["never", "debug"]

- name: "Creating SNMP entry: {{ desired_settings.name }}"
  fortinet.fortios.fortios_system_snmp_user:
    vdom: "{{ vdom | default(omit, true) }}"
    state: "present"
    system_snmp_user:
      auth_proto: "{{ desired_settings['auth-proto'] | default(omit, true) }}"
      auth_pwd: "{{ snmp_password }}"
      events: "{{ desired_settings.events.split(' ') | select() | list if desired_settings.events is defined else omit }}"
      ha_direct: "{{ desired_settings['ha-direct'] | default(omit, true) }}"
      mib_view: "{{ desired_settings['mib-view'] | default(omit, true) }}"
      name: "{{ desired_settings.name | default(omit, true) }}"
      notify_hosts: "{{ desired_settings['notify-hosts'] | default(omit, true) }}"
      notify_hosts6: "{{ desired_settings['notify-hosts6'] | default(omit, true) }}"
      priv_proto: "{{ desired_settings['priv-proto'] | default(omit, true) }}"
      priv_pwd: "{{ snmp_password }}"
      queries: "{{ desired_settings.queries | default(omit, true) }}"
      query_port: "{{ desired_settings['query-port'] | default(omit, true) }}"
      security_level: "{{ desired_settings['security-level'] | default(omit, true) }}"
      source_ip: "{{ desired_settings['source-ip'] | default(omit, true) }}"
      source_ipv6: "{{ desired_settings['source-ipv6'] | default(omit, true) }}"
      status: "{{ desired_settings.status | default(omit, true) }}"
      trap_lport: "{{ desired_settings['trap-lport'] | default(omit, true) }}"
      trap_rport: "{{ desired_settings['trap-rport'] | default(omit, true) }}"
      trap_status: "{{ desired_settings['trap-status'] | default(omit, true) }}"
      vdoms: "{{ desired_settings.vdoms | default(omit, true) }}"
  register: "output"

- name: "Debug"
  ansible.builtin.debug:
    msg: "{{ output }}"
  tags: ["never", "debug"]
