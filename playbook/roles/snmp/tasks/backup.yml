---
- name: "Fetching all SNMP entries"
  ansible.builtin.include_tasks: "{{ path_common_firewall_configuration_fact }}"
  vars:
    selector: "system.snmp_user"

- name: "Debug"
  ansible.builtin.debug:
    msg: "{{ data }}"
  tags: ["never", "debug"]

- name: "Ensure the backup directory exists"
  ansible.builtin.include_tasks: "{{ path_common_firewall_create_directory }}"
  vars:
    path: "{{ backup_snmp_path }}"

- name: "Saving the SNMP backup and minimal files"
  ansible.builtin.include_tasks: "{{ path_common_firewall_save_backup_files }}"
  vars:
    entry: >-
      {{ (item
      | ansible.utils.remove_keys(target=[invalid_attribute, 'auth-pwd', 'priv-pwd'])) }}
    dest_dir: "{{ backup_snmp_path }}"
    dest_basename: "{{ (item.name | replace(' ', '-')) | lower }}"
    minimal_keys: "{{ snmp_minimal_keys }}"
  loop: "{{ data.meta.results | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
