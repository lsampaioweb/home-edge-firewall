---
- name: "Reading the json file '{{ file.path }}' that contains the desired settings"
  ansible.builtin.set_fact:
    desired_settings: "{{ lookup('file', file.path) | from_json }}"

- name: "Printing the desired settings json object"
  ansible.builtin.debug:
    msg: "{{ desired_settings }}"
  tags: ["never", "debug"]

- name: "Creating/Updating DNS Server on Interface: '{{ desired_settings.name }}'"
  fortinet.fortios.fortios_system_dns_server:
    vdom: "{{ vdom | default(omit, true) }}"
    state: "present"
    system_dns_server:
      name: "{{ desired_settings.name }}"
      mode: "{{ desired_settings.mode | default(omit, true) }}" # noqa: args[module]
      dnsfilter_profile: "{{ desired_settings['dnsfilter-profile'] | default(omit, true) }}"
      doh: "{{ desired_settings.doh | default(omit, true) }}"
      doh3: "{{ desired_settings.doh3 | default(omit, true) }}"
      doq: "{{ desired_settings.doq | default(omit, true) }}"
  register: "output"

- name: "Debug"
  ansible.builtin.debug:
    msg: "{{ output }}"
  tags: ["never", "debug"]
