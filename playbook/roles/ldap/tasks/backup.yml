---
- name: "Fetching all LDAP entries"
  ansible.builtin.include_tasks: "{{ path_common_firewall_configuration_fact }}"
  vars:
    selector: "user_ldap"

- name: "Debug"
  ansible.builtin.debug:
    msg: "{{ data }}"
  tags: ["never", "debug"]

- name: "Ensure the backup directory exists"
  ansible.builtin.include_tasks: "{{ path_common_firewall_create_directory }}"
  vars:
    path: "{{ backup_ldap_path }}"

- name: "Saving the LDAP backup and minimal files"
  ansible.builtin.include_tasks: "{{ path_common_firewall_save_backup_files }}"
  vars:
    entry: "{{ (item | ansible.utils.remove_keys(target=[invalid_attribute])) }}"
    dest_dir: "{{ backup_ldap_path }}"
    dest_basename: "{{ (item.name | replace(' ', '-')) | lower }}"
    minimal_keys: "{{ ldap_minimal_keys }}"
  loop: "{{ data.meta.results | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
