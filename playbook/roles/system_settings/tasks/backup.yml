---
- name: "Fetching all system global settings"
  ansible.builtin.include_tasks: "{{ path_common_firewall_configuration_fact }}"
  vars:
    selector: "system_global"

- name: "Debug"
  ansible.builtin.debug:
    msg: "{{ data }}"
    # msg: "{{ output.meta.results }}"
    # msg: "{{ output.meta.results.hostname }}"
  tags: ["never", "debug"]

- name: "Ensure the backup directory exists"
  ansible.builtin.include_tasks: "{{ path_common_firewall_create_directory }}"
  vars:
    path: "{{ backup_system_settings_path }}"

- name: "Saving the System Settings backup and minimal files"
  ansible.builtin.include_tasks: "{{ path_common_firewall_save_backup_files }}"
  vars:
    entry: "{{ data.meta.results | ansible.utils.remove_keys(target=[invalid_attribute]) }}"
    dest_dir: "{{ backup_system_settings_path }}"
    dest_basename: "{{ (data.meta.results.hostname | replace(' ', '-')) | lower }}"
    minimal_keys: "{{ system_settings_minimal_keys }}"
